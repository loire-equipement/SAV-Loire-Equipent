<title>Loire Equipement - SAV Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --acc:#2563EB;--acc-d:#1D4ED8;--acc-l:#EFF6FF;
  --rd:#EF4444;--rdl:#FEF2F2;--rdm:#FECACA;
  --gn:#10B981;--gnl:#D1FAE5;--am:#F59E0B;
  --g0:#F8FAFC;--g1:#F1F5F9;--g2:#E2E8F0;
  --g4:#94A3B8;--g6:#64748B;--g8:#334155;--g9:#0F172A;
  --bg:#F0F4F8;--card:#fff;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --sh:0 1px 4px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;color:var(--g9);display:flex;flex-direction:column;}
button,input,select,textarea{font-family:inherit;-webkit-appearance:none;}
::-webkit-scrollbar{display:none;}

/* ── LOGIN ── */
#auth{position:fixed;inset:0;z-index:999;background:linear-gradient(160deg,#1E40AF 0%,var(--acc) 55%,#0EA5E9 100%);display:flex;flex-direction:column;overflow-y:auto;transition:opacity .3s;}
#auth.hidden{opacity:0;pointer-events:none;}
.auth-top{padding:calc(44px + var(--st)) 22px 28px;}
.auth-body{background:var(--card);border-radius:28px 28px 0 0;flex:1;padding:26px 18px calc(28px + var(--sb));min-height:55vh;}
.pb{width:100%;display:flex;align-items:center;gap:13px;padding:14px 16px;border-radius:16px;border:1.5px solid var(--g2);background:var(--card);margin-bottom:10px;text-align:left;box-shadow:var(--sh);transition:transform .15s,box-shadow .15s;}
.pb:active{transform:scale(.98);}
.pb.admin{border-color:#BFDBFE;background:linear-gradient(135deg,#EFF6FF,#DBEAFE);}

/* ── AUTH PASSWORD SCREENS ── */
.auth-screen{display:none;flex-direction:column;flex:1;}
.auth-screen.on{display:flex;}
.auth-inp{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--g2);font-size:16px;color:var(--g9);background:var(--g0);outline:none;transition:border-color .15s,background .15s;}
.auth-inp:focus{border-color:var(--acc);background:#fff;}
.auth-err{display:none;background:var(--rdl);border:1px solid var(--rdm);border-radius:10px;padding:9px 13px;font-size:13px;color:var(--rd);margin-bottom:10px;}
.auth-btn{width:100%;padding:14px;border-radius:12px;background:var(--acc);color:#fff;border:none;font-size:16px;font-weight:700;}
.auth-btn:active{background:var(--acc-d);}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100%;}
#app.on{display:flex;}
#topbar{background:linear-gradient(135deg,var(--acc-d,#1D4ED8),var(--acc));padding:calc(var(--st)+11px) 16px 11px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-title{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.02em;flex:1;}
.tb-right{display:flex;align-items:center;gap:9px;}
.tb-btn{background:rgba(255,255,255,.18);border:none;width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;position:relative;flex-shrink:0;}
#bell-badge{position:absolute;top:5px;right:5px;width:9px;height:9px;border-radius:50%;background:var(--rd);border:2px solid var(--acc);display:none;}
.tb-av{border-radius:50%;overflow:hidden;font-size:11px;font-weight:800;}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.view{display:none;padding:15px 14px 20px;}
.view.on{display:block;}

/* ── NAV ── */
#nav{background:var(--card);border-top:1px solid rgba(0,0,0,.06);display:flex;padding-bottom:var(--sb);flex-shrink:0;height:calc(60px + var(--sb));box-shadow:0 -2px 14px rgba(0,0,0,.06);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--g4);font-size:10px;font-weight:500;min-height:54px;transition:color .15s;}
.nb.on{color:var(--acc);}
.nb svg{opacity:.5;transition:opacity .15s;}
.nb.on svg,.nb.on span{opacity:1;font-weight:700;}
.fab-wrap{flex:1.2;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:4px;}
.fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--pu,#7C3AED));border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 18px rgba(37,99,235,.4);transform:translateY(-12px);transition:transform .15s;}
.fab:active{transform:translateY(-12px) scale(.95);}
.fab-label{font-size:10px;color:var(--acc);font-weight:700;margin-top:-4px;}
.nb-has::after{content:'';position:absolute;top:1px;right:12px;width:8px;height:8px;border-radius:50%;background:var(--rd);border:2px solid var(--card);}

/* ── CARDS ── */
.card{background:var(--card);border-radius:16px;box-shadow:var(--sh);overflow:hidden;}
.tc{background:var(--card);border-radius:16px;margin-bottom:11px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);cursor:pointer;}

/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.prio{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 14px;border-radius:11px;font-size:13px;font-weight:600;border:1.5px solid var(--g2);background:var(--card);color:var(--g8);cursor:pointer;transition:transform .1s;}
.btn:active{transform:scale(.97);}
.btn-p{background:var(--acc);color:#fff;border-color:var(--acc);}
.btn-p:active{background:var(--acc-d);}
.btn-d{background:var(--rdl);color:var(--rd);border-color:var(--rdm);}
.btn-g{background:var(--gnl);color:#065F46;border-color:#A7F3D0;}
.btn-full{width:100%;padding:12px;font-size:14px;margin-top:8px;}
.btn-dash{flex:1;padding:8px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer;}

/* ── FILTERS ── */
.pills{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
.pill{padding:7px 14px;border-radius:20px;border:1.5px solid var(--g2);background:var(--card);color:var(--g6);font-size:12px;font-weight:500;white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .15s;}
.pill.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:700;}

/* ── OVERLAYS ── */
.ov{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:flex-end;justify-content:center;z-index:500;backdrop-filter:blur(4px);}
.ov.on{display:flex;}
.sheet{background:var(--card);border-radius:24px 24px 0 0;padding:20px 17px calc(26px + var(--sb));width:100%;max-height:93vh;overflow-y:auto;}
.mid-ov{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:600;backdrop-filter:blur(4px);padding:20px;}
.mid-ov.on{display:flex;}
.modal{background:var(--card);border-radius:20px;padding:22px 18px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;}

/* ── FORM FIELDS ── */
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--g6);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border-radius:11px;border:1.5px solid var(--g2);font-size:15px;color:var(--g9);background:var(--g0);outline:none;transition:border-color .15s,background .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc);background:#fff;}
.field textarea{resize:none;min-height:78px;}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none;}
.search-inp{width:100%;padding:11px 13px 11px 38px;border-radius:12px;border:1.5px solid var(--g2);font-size:14px;color:var(--g9);background:var(--card);outline:none;transition:border-color .15s;}
.search-inp:focus{border-color:var(--acc);}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;background:var(--g2);border:none;font-size:14px;color:var(--g6);cursor:pointer;}

/* ── PHOTOS ── */
.ph-strip{display:flex;gap:9px;overflow-x:auto;padding:3px 0;}
.ph-wrap{position:relative;flex-shrink:0;}
.ph-img{width:72px;height:72px;border-radius:12px;object-fit:cover;box-shadow:var(--sh);}
.ph-del{position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;background:var(--rd);border:2.5px solid var(--card);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:800;cursor:pointer;}
.ph-add{width:72px;height:72px;border-radius:12px;border:2px dashed var(--g2);background:var(--g0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--g4);font-size:10px;flex-shrink:0;cursor:pointer;}

/* ── TIMELINE ── */
.tl-item{display:flex;gap:10px;padding-bottom:12px;position:relative;}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:14px;top:28px;width:2px;bottom:0;background:var(--g1);}
.tl-dot{width:28px;height:28px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1;}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px;}
.kpi{background:var(--card);border-radius:16px;padding:15px;box-shadow:var(--sh);cursor:pointer;transition:transform .1s;}
.kpi:active{transform:scale(.97);}

/* ── ADMIN ── */
.a-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:var(--sh);}
.a-title{font-size:13px;font-weight:800;color:var(--g9);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--g1);}
.a-inp{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--g2);font-size:14px;color:var(--g9);background:var(--g0);outline:none;margin-bottom:4px;transition:border-color .15s;}
.a-inp:focus{border-color:var(--acc);}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(76px + var(--sb));left:50%;transform:translateX(-50%) translateY(8px);background:#0F172A;color:#fff;border-radius:12px;padding:11px 18px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:9999;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.3);max-width:90vw;text-align:center;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}

/* ── RESPONSIVE DESKTOP ── */
@media(min-width:768px){
  body{background:#1E293B;}
  #auth{flex-direction:row;align-items:center;justify-content:center;}
  #auth-profiles-screen,#auth-pw-screen{width:420px;max-width:420px;border-radius:24px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.5);flex:none!important;}
  #auth-profiles-screen{background:linear-gradient(160deg,#1E40AF 0%,var(--acc) 55%,#0EA5E9 100%);}
  #auth-pw-screen{background:linear-gradient(160deg,#1E40AF,var(--acc));}
  .auth-top{padding:36px 28px 24px;}
  .auth-body{padding:28px 28px 32px;}
  #app{flex-direction:row;}
  #topbar{flex-direction:column;width:240px;flex-shrink:0;padding:28px 0 0!important;height:100vh;align-items:flex-start;justify-content:flex-start;border-radius:0;gap:0;}
  .tb-title{font-size:16px;padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,.1);width:100%;margin-bottom:12px;flex:none;}
  .tb-right{flex-direction:column;align-items:flex-start;padding:0 12px;gap:6px;width:100%;}
  .tb-btn{width:100%;border-radius:10px;justify-content:flex-start;gap:10px;padding:10px 14px;height:auto;}
  .tb-btn::after{content:attr(data-label);color:#fff;font-size:13px;font-weight:600;}
  .tb-av{width:100%!important;border-radius:10px!important;justify-content:flex-start!important;gap:10px;padding:10px 14px;height:auto!important;}
  .tb-av::after{content:attr(data-label);color:#fff;font-size:13px;font-weight:600;}
  #main{flex:1;height:100vh;overflow-y:auto;}
  #nav{position:relative;width:240px;flex-shrink:0;flex-direction:column;height:100vh;background:rgba(255,255,255,.08);border-top:none;padding:12px 0 20px;box-shadow:none;display:flex!important;}
  #topbar{position:relative;}
  .nb{flex-direction:row;justify-content:flex-start;gap:12px;padding:11px 20px;font-size:13px;min-height:auto;border-radius:0;color:rgba(255,255,255,.7);}
  .nb.on{color:#fff;background:rgba(255,255,255,.15);}
  .nb svg{opacity:.7!important;}
  .nb.on svg{opacity:1!important;}
  .fab-wrap{flex-direction:row;justify-content:flex-start;padding:8px 16px;width:100%;transform:none!important;}
  .fab{transform:none!important;width:38px;height:38px;flex-shrink:0;box-shadow:none;}
  .fab-label{color:#fff;font-size:13px;font-weight:600;margin-top:0;}
  .view{max-width:900px;margin:0 auto;padding:28px 32px 32px;}
  .kpi-grid{grid-template-columns:repeat(4,1fr);}
  .ov{align-items:center;}
  .sheet{border-radius:20px!important;max-width:560px;margin:0 auto;padding:26px 26px 28px!important;}
}
@media(min-width:1100px){
  #topbar,#nav{width:260px;}

  <div id="auth-pw-screen" class="auth-screen">

        <div id="pw-av" style="width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;overflow:hidden;flex-shrink:0;"></div>
        <div>
          <div id="pw-name" style="font-size:19px;font-weight:800;color:#fff;"></div>
          <div id="pw-sub" style="font-size:12px;color:rgba(255,255,255,.65);">Premiere connexion</div>
        </div>
      </div>
      <h2 id="pw-title" style="font-size:24px;font-weight:800;color:#fff;">Creez votre mot de passe</h2>
    </div>
    <div class="auth-body">
      <div id="bio-wrap" style="display:none;margin-bottom:14px;">
        <button onclick="doBio()" style="width:100%;padding:14px;border-radius:12px;background:#0F172A;color:#fff;border:none;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
          Connexion par empreinte
        </button>
        <p style="text-align:center;font-size:12px;color:var(--g4);margin-top:8px;">— ou entrez votre mot de passe —</p>

      <div id="pw-field1-wrap" style="margin-bottom:12px;">
        <label style="font-size:11px;font-weight:700;color:var(--g6);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;" id="pw-field1-label">Mot de passe</label>
        <input id="pw1" class="auth-inp" type="password" placeholder="Votre mot de passe" onkeydown="if(event.key==='Enter')pwSubmit()">
      </div>
      <div id="pw-field2-wrap" style="margin-bottom:12px;display:none;">
        <label style="font-size:11px;font-weight:700;color:var(--g6);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;">Confirmer</label>
        <input id="pw2" class="auth-inp" type="password" placeholder="Repetez le mot de passe">

<script>
/* DONNÉES STATIQUES */
var USERS = {
  admin:  {id:"admin",  name:"Richard Colineau", role:"Gestionnaire", initials:"RC", hue:215, tel:"0683310608"},
  marc:   {id:"marc",   name:"Francis Toulme",   role:"Technicien",   initials:"FT", hue:200, tel:"0672085509"},

  status: {bg:"#FEF3C7",fg:"#92400E",s:"~"},

  {c:"#2563EB",n:"Bleu"},  {c:"#7C3AED",n:"Violet"}, {c:"#059669",n:"Vert"},
  {c:"#EA580C",n:"Orange"},{c:"#DC2626",n:"Rouge"},   {c:"#0891B2",n:"Cyan"},
  {c:"#0F172A",n:"Sombre"}
];

/* ÉTAT */
var CU=null, CV="dash", nid=100, phTid=null, sigTid=null, delId=null, delFD=false;
var T=[], N=[], CFG={company:"Loire Equipement"}, PROFILES={};
var _search="", _dashFilter="active";
var DB=null, pendingUid=null, pwMode="login";

/* STOCKAGE LOCAL */
function loadLocal() {
  try { var d=localStorage.getItem("sav_v2"); if(d){var p=JSON.parse(d);T=p.t||[];N=p.n||[];nid=p.nid||100;} } catch(e){}
  try { var c=localStorage.getItem("sav_cfg2"); if(c){CFG=Object.assign(CFG,JSON.parse(c));}} catch(e){}
  try { var pr=localStorage.getItem("sav_pr2"); if(pr)PROFILES=JSON.parse(pr);} catch(e){}
  if(!T.length) T=defaultTickets();
  if(!N.length) N=defaultNotifs();
  cleanup();
}
function saveLocal() {
  try{localStorage.setItem("sav_v2",JSON.stringify({t:T,n:N,nid:nid}));}catch(e){}
}
function saveCfg() {
  try{localStorage.setItem("sav_cfg2",JSON.stringify(CFG));}catch(e){}
}
function savePr() {
  try{localStorage.setItem("sav_pr2",JSON.stringify(PROFILES));}catch(e){}
}
function getPr(uid) {
  return PROFILES[uid]||{pw:null,photo:null,color:null,bg:null};
}
function cleanup() {
  var ago=Date.now()-86400000;
  T=T.map(function(t){return (t.status==="done"&&!t.doneAt)?Object.assign({},t,{doneAt:Date.now()}):t;});
  T=T.filter(function(t){return t.status!=="done"||(t.doneAt&&t.doneAt>ago);});
}

/* UTILS */
function now(){var d=new Date();return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);}
function hsl(h){return "hsl("+h+",55%,93%)";}
function hslD(h){return "hsl("+h+",60%,35%)";}
var _toastT;
function toast(m){var e=document.getElementById("toast");if(!e)return;e.textContent=m;e.classList.add("on");clearTimeout(_toastT);_toastT=setTimeout(function(){e.classList.remove("on");},2500);}
function updBadge(){
  var u=N.filter(function(n){return !n.read&&n.ic==="create";}).length;
  document.getElementById("bell-badge").style.display=u?"block":"none";
  var nb=document.getElementById("nb-notifs");
  if(nb) nb.style.position="relative";
}
function bH(st){var c=SC[st]||SC.pending;return '<span class="bdg" style="background:'+c.bg+';color:'+c.fg+';border:1px solid '+c.ring+'"><span class="bdg-dot" style="width:6px;height:6px;border-radius:50%;background:'+c.dot+';flex-shrink:0;display:inline-block;margin-right:4px;"></span>'+c.l+'</span>';}
function pH(p){var c=PC[p]||PC.medium;return '<span class="prio" style="background:'+c.bg+';color:'+c.c+'">'+c.l+'</span>';}
function avEl(uid,size,fs){
  var u=USERS[uid];if(!u)return '';
  var pr=getPr(uid);
  if(pr.photo)return '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;overflow:hidden;flex-shrink:0;"><img src="'+pr.photo+'" style="width:100%;height:100%;object-fit:cover;"/></div>';
  return '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+hsl(u.hue)+';color:'+hslD(u.hue)+';font-size:'+fs+'px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+u.initials+'</div>';
}
function avInline(uid){
  if(!uid)return '<span style="font-size:11px;color:var(--g4);font-style:italic;">Non assigne</span>';
  var u=USERS[uid];if(!u)return '';
  return '<span style="display:inline-flex;align-items:center;gap:6px;">'+avEl(uid,22,8)+'<span style="font-size:12px;color:var(--g8);">'+u.name+'</span></span>';
}
function prioColor(p){return p==="urgent"?"#EF4444":p==="medium"?"#F59E0B":"#94A3B8";}
function bldText(list){
  return (CFG.company||"Loire Equipement")+" - Rapport interventions\n"+new Date().toLocaleDateString("fr-FR")+"\n"+Array(40).join("-")+"\n\n"
    +list.map(function(t){var u=t.tech?USERS[t.tech]:null;return "["+t.id+"] "+t.title+"\n  Statut: "+SC[t.status].l+"\n  Priorite: "+(PC[t.priority]?PC[t.priority].l:"?")+"\n  Technicien: "+(u?u.name:"Non assigne")+"\n  Tel: "+(t.tel||"-")+"\n  Date: "+t.date+" "+t.heure+(t.desc?"\n  Note: "+t.desc:"");}).join("\n\n");
}
function pushNotif(ic,m,s){
  N.unshift({id:Date.now(),read:false,time:now(),ic:ic,m:m,s:s});
  saveLocal();updBadge();
  if(Notification&&Notification.permission==="granted"){try{var n=new Notification("Loire Equipement",{body:m,tag:"sav"});setTimeout(function(){n.close();},6000);}catch(e){}}
  if(CV==="notifs")renderNotifs();
  if(DB){try{DB.ref("savpro3/n").set(N.slice(0,50));}catch(e){}}
}

/* DÉFAUT DATA */
function defaultTickets(){
  return [
    {id:"SAV-001",title:"Refrigerateur en panne",tel:"04 91 00 00 00",desc:"Compresseur hors service.",status:"assigned",priority:"urgent",tech:"marc",date:"27/03",heure:"08:15",photos:[],hist:[{h:"08:15",l:"Ticket cree",t:"create"},{h:"08:22",l:"Assigne a Francis Toulme",t:"assign"}]},
    {id:"SAV-002",title:"Climatiseur bruit anormal",tel:"04 42 00 00 00",desc:"Vibration forte au demarrage.",status:"in-progress",priority:"medium",tech:"lucie",date:"26/03",heure:"14:00",photos:[],hist:[{h:"14:00",l:"Ticket cree",t:"create"}]},
    {id:"SAV-003",title:"Lave-vaisselle fuite",tel:"04 94 00 00 00",desc:"Fuite lors du cycle de lavage.",status:"pending",priority:"medium",tech:null,date:"27/03",heure:"11:30",photos:[],hist:[{h:"11:30",l:"Ticket cree",t:"create"}]}
  ];
}
function defaultNotifs(){
  return [{id:1,read:false,time:"08:22",ic:"create",m:"SAV-001 cree - URGENT",s:"Refrigerateur en panne"}];
}

/* THÈME */
function applyColor(uid){
  var pr=getPr(uid);
  var c=pr.color||"#2563EB";
  var isDark=c==="#0F172A";
  document.documentElement.style.setProperty("--acc",c);
  document.documentElement.style.setProperty("--acc-d",isDark?"#1E293B":c);
  document.documentElement.style.setProperty("--acc-l",isDark?"#1E293B":"#EFF6FF");
  document.documentElement.style.setProperty("--card",isDark?"#1E293B":"#fff");
  document.documentElement.style.setProperty("--g0",isDark?"#0F172A":"#F8FAFC");
  document.documentElement.style.setProperty("--g1",isDark?"#1E293B":"#F1F5F9");
  document.documentElement.style.setProperty("--g2",isDark?"#334155":"#E2E8F0");
  document.documentElement.style.setProperty("--g4",isDark?"#64748B":"#94A3B8");
  document.documentElement.style.setProperty("--g6",isDark?"#94A3B8":"#64748B");
  document.documentElement.style.setProperty("--g8",isDark?"#CBD5E1":"#334155");
  document.documentElement.style.setProperty("--g9",isDark?"#F1F5F9":"#0F172A");
  document.documentElement.style.setProperty("--bg",isDark?"#0F172A":"#F0F4F8");
  document.getElementById("theme-meta").content=c;
  if(pr.bg){
    document.getElementById("main").style.backgroundImage="url("+pr.bg+")";
    document.getElementById("main").style.backgroundSize="cover";
    document.getElementById("main").style.backgroundPosition="center";
  } else {
    document.getElementById("main").style.backgroundImage="";
  }
}

/* AUTH */
function showProfiles(){
  document.getElementById("auth-profiles-screen").style.display="flex";
  document.getElementById("auth-pw-screen").classList.remove("on");
  pendingUid=null;
  buildProfiles();
}
function buildProfiles(){
  var _lco=document.getElementById("login-co");if(_lco)_lco.textContent=CFG.company||"Loire Equipement";
  var order=["admin","marc","lucie","karim","sophie"];
  var html=order.map(function(uid,i){
    var u=USERS[uid]; if(!u)return '';
    var pr=getPr(uid);
    var isAdmin=uid==="admin";
    var av=pr.photo
      ?'<div style="width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0;"><img src="'+pr.photo+'" style="width:100%;height:100%;object-fit:cover;"/></div>'
      :'<div style="width:48px;height:48px;border-radius:50%;background:'+hsl(u.hue)+';color:'+hslD(u.hue)+';font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+u.initials+'</div>';
    var lock=pr.pw
      ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--g4)" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'
      :'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"><path d="M8 11V7a4 4 0 0 1 8 0"/><rect x="3" y="11" width="18" height="11" rx="2"/></svg>';
    return '<button class="pb'+(isAdmin?" admin":"")+'" onclick="tapProfile(\''+uid+'\')">'+av
      +'<div style="flex:1;"><div style="font-size:15px;font-weight:700;color:'+(isAdmin?"var(--acc)":"var(--g9)")+';">'+u.name+'</div>'
      +'<div style="font-size:12px;color:var(--g4);">'+(isAdmin?"Gestionnaire":"Technicien")+'</div></div>'+lock+'</button>';
  }).join("");
  document.getElementById("profile-list").innerHTML=html;
}
function tapProfile(uid){
  pendingUid=uid;
  var u=USERS[uid];
  var pr=getPr(uid);
  // Show pw screen
  document.getElementById("auth-profiles-screen").style.display="none";
  document.getElementById("auth-pw-screen").classList.add("on");
  // Avatar
  var av=document.getElementById("pw-av");
  if(pr.photo){av.innerHTML='<img src="'+pr.photo+'" style="width:100%;height:100%;object-fit:cover;"/>';}
  else{av.textContent=u.initials;av.style.background=hsl(u.hue);av.style.color=hslD(u.hue);}
  document.getElementById("pw-name").textContent=u.name;
  if(!pr.pw){
    // First time: create password
    pwMode="create";
    document.getElementById("pw-sub").textContent="Premiere connexion";
    document.getElementById("pw-title").textContent="Creez votre mot de passe";
    document.getElementById("pw-field1-label").textContent="Mot de passe (min. 4 caracteres)";
    document.getElementById("pw-field2-wrap").style.display="block";
    document.getElementById("pw-btn").textContent="Creer mon espace";
    document.getElementById("pw-reset-btn").style.display="none";
    document.getElementById("bio-wrap").style.display="none";
  } else {
    // Login
    pwMode="login";
    document.getElementById("pw-sub").textContent="Espace prive";
    document.getElementById("pw-title").textContent="Mot de passe";
    document.getElementById("pw-field1-label").textContent="Mot de passe";
    document.getElementById("pw-field2-wrap").style.display="none";
    document.getElementById("pw-btn").textContent="Se connecter";
    document.getElementById("pw-reset-btn").style.display="block";
    // Show biometric if registered
    var bioKey="bio_"+uid;
    var hasBio=false; try{hasBio=!!localStorage.getItem(bioKey);}catch(e){}
    document.getElementById("bio-wrap").style.display=hasBio?"block":"none";
  }
  document.getElementById("pw1").value="";
  document.getElementById("pw2").value="";
  document.getElementById("pw-err").style.display="none";
  setTimeout(function(){document.getElementById("pw1").focus();},300);
}
function pwSubmit(){
  var p1=document.getElementById("pw1").value;
  var err=document.getElementById("pw-err");
  err.style.display="none";
  if(pwMode==="create"){
    var p2=document.getElementById("pw2").value;
    if(p1.length<4){err.textContent="Minimum 4 caracteres.";err.style.display="block";return;}
    if(p1!==p2){err.textContent="Les mots de passe ne correspondent pas.";err.style.display="block";return;}
    if(!PROFILES[pendingUid])PROFILES[pendingUid]={};
    PROFILES[pendingUid].pw=p1;savePr();
    doLogin(pendingUid);
  } else {
    var pr=getPr(pendingUid);
    if(p1!==pr.pw){err.textContent="Mot de passe incorrect.";err.style.display="block";return;}
    doLogin(pendingUid);
  }
}
function resetPw(){
  if(confirm("Reinitialiser le mot de passe de "+USERS[pendingUid].name+" ?")){
    if(PROFILES[pendingUid])PROFILES[pendingUid].pw=null;
    savePr();showProfiles();toast("Mot de passe reinitialise.");
  }
}
function doBio(){
  var pr=getPr(pendingUid);
  var stored=null;try{stored=JSON.parse(localStorage.getItem("bio_"+pendingUid));}catch(e){}
  if(!stored){toast("Empreinte non enregistree.");return;}
  var ch=new Uint8Array(32);window.crypto.getRandomValues(ch);
  navigator.credentials.get({publicKey:{challenge:ch,allowCredentials:[{type:"public-key",id:new Uint8Array(stored.id)}],userVerification:"required",timeout:60000}})
    .then(function(){doLogin(pendingUid);})
    .catch(function(){toast("Empreinte non reconnue.");});
}
function doLogin(uid){
  CU=USERS[uid];
  try{localStorage.setItem("sav_sess",uid);}catch(e){}
  applyColor(uid);
  // Topbar
  var pr=getPr(uid);
  var tbAv=document.getElementById("tb-av-wrap");
  if(pr.photo){tbAv.innerHTML='<img src="'+pr.photo+'" style="width:34px;height:34px;border-radius:50%;object-fit:cover;">';}
  else{tbAv.innerHTML='<span style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;">'+CU.initials+'</span>';}
  var _tt=document.getElementById("tb-title");if(_tt)_tt.textContent=CFG.company||"Loire Equipement";
  document.getElementById("nb-admin").style.display=uid==="admin"?"flex":"none";
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.add("on");
  goTo("dash");updBadge();
  if(Notification&&Notification.permission==="default")setTimeout(function(){Notification.requestPermission();},2000);
  // Enregistrer token FCM si notifications activees
  setTimeout(function(){
    if(Notification&&Notification.permission==="granted")initFCM();
  },1500);
}
function doLogout(){
  CU=null;
  try{localStorage.removeItem("sav_sess");}catch(e){}
  document.getElementById("app").classList.remove("on");
  document.getElementById("auth").classList.remove("hidden");
  document.documentElement.style.cssText="";
  document.getElementById("main").style.backgroundImage="";
  showProfiles();
}

/* NAVIGATION */
function goTo(v){
  CV=v;
  document.querySelectorAll(".view").forEach(function(e){e.classList.remove("on");});
  document.querySelectorAll(".nb").forEach(function(e){e.classList.remove("on");});
  var vEl=document.getElementById("view-"+v); if(vEl)vEl.classList.add("on");
  var nEl=document.getElementById("nb-"+v); if(nEl)nEl.classList.add("on");

function qStatus(id,st){

/* ADMIN */
function renderAdmin(){
  if(!CU||CU.id!=="admin"){document.getElementById("view-admin").innerHTML='<p style="text-align:center;padding:40px;color:var(--g4);">Acces refuse</p>';return;}
  var total=T.length,done=T.filter(function(t){return t.status==="done";}).length;
  var actif=T.filter(function(t){return t.status!=="done";}).length;
  var rate=total>0?Math.round(done/total*100):0;
  var techStats=TECH_ORDER.map(function(tid){
    var u=USERS[tid];if(!u)return null;
    var mine=T.filter(function(t){return t.tech===tid;});
    var a=mine.filter(function(t){return t.status!=="done";}).length;
    var d=mine.filter(function(t){return t.status==="done";}).length;
    return {name:u.name.split(" ")[0],hue:u.hue,id:tid,act:a,done:d,total:mine.length};
  }).filter(Boolean);
  var h='<h1 style="font-size:20px;font-weight:900;letter-spacing:-.03em;margin-bottom:14px;">Administration</h1>';
  // Dashboard gradient
  h+='<div style="background:linear-gradient(135deg,#1E40AF,#7C3AED);border-radius:18px;padding:18px;margin-bottom:14px;">';
  h+='<p style="font-size:10px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;">Tableau de bord global</p>';
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px;">';
  [{l:"Total",v:total,c:"#fff"},{l:"Actifs",v:actif,c:"#93C5FD"},{l:"Termines",v:done,c:"#6EE7B7"}].forEach(function(s){
    h+='<div style="background:rgba(255,255,255,.15);border-radius:11px;padding:11px;text-align:center;"><div style="font-size:24px;font-weight:900;color:'+s.c+';line-height:1;">'+s.v+'</div><div style="font-size:10px;color:rgba(255,255,255,.65);">'+s.l+'</div></div>';
  });
  h+='</div>';
  h+='<p style="font-size:11px;color:rgba(255,255,255,.65);margin-bottom:5px;">Taux de cloture : <strong style="color:#fff;">'+rate+'%</strong></p>';
  h+='<div style="height:7px;background:rgba(255,255,255,.2);border-radius:10px;overflow:hidden;margin-bottom:14px;"><div style="height:100%;width:'+rate+'%;background:linear-gradient(90deg,#34D399,#10B981);border-radius:10px;"></div></div>';
  techStats.forEach(function(ts){
    var p=Math.min(Math.round(ts.act/5*100),100);
    var col=p>80?"#FCA5A5":p>50?"#FCD34D":"#6EE7B7";
    h+='<div style="display:flex;align-items:center;gap:9px;margin-bottom:7px;">';
    h+='<span style="font-size:11px;color:rgba(255,255,255,.8);min-width:72px;font-weight:600;">'+ts.name+'</span>';
    h+='<div style="flex:1;height:5px;background:rgba(255,255,255,.2);border-radius:10px;overflow:hidden;"><div style="height:100%;width:'+p+'%;background:'+col+';border-radius:10px;"></div></div>';
    h+='<span style="font-size:10px;color:rgba(255,255,255,.6);min-width:30px;text-align:right;">'+ts.act+'/'+ts.total+'</span></div>';
  });
  h+='</div>';
  // Stats table
  h+='<div class="a-card"><div class="a-title">Statistiques par technicien</div>';
  h+='<table style="width:100%;border-collapse:collapse;font-size:13px;">';
  h+='<tr style="border-bottom:2px solid var(--g2);"><th style="text-align:left;padding:7px 5px;font-size:11px;color:var(--g4);text-transform:uppercase;">Technicien</th><th style="text-align:center;padding:7px 5px;font-size:11px;color:var(--g4);">Actifs</th><th style="text-align:center;padding:7px 5px;font-size:11px;color:var(--g4);">Termines</th><th style="text-align:center;padding:7px 5px;font-size:11px;color:var(--g4);">Taux</th></tr>';
  techStats.forEach(function(ts){
    var tx=ts.total>0?Math.round(ts.done/ts.total*100):0;
    var tc=tx>70?"#065F46":tx>40?"#92400E":"#991B1B";
    var tb=tx>70?"#D1FAE5":tx>40?"#FEF3C7":"#FEE2E2";
    h+='<tr style="border-bottom:1px solid var(--g1);">';
    h+='<td style="padding:9px 5px;font-weight:600;">'+ts.name+'</td>';
    h+='<td style="text-align:center;padding:9px 5px;color:#1E40AF;font-weight:700;">'+ts.act+'</td>';
    h+='<td style="text-align:center;padding:9px 5px;color:#065F46;font-weight:700;">'+ts.done+'</td>';
    h+='<td style="text-align:center;padding:9px 5px;"><span style="background:'+tb+';color:'+tc+';padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;">'+tx+'%</span></td></tr>';
  });
  h+='</table></div>';
  // Tableau des interventions par technicien
  h+='<div class="a-card"><div class="a-title">Interventions par technicien</div>';
  var unassigned=T.filter(function(t){return !t.tech&&t.status!=="done";});
  if(unassigned.length){
    h+='<div style="background:#FEF3C7;border-radius:10px;padding:9px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;">';
    h+='<p style="font-size:12px;font-weight:700;color:#92400E;">Non assignes</p>';
    h+='<span style="background:#F59E0B;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;">'+unassigned.length+'</span></div>';
    unassigned.forEach(function(t){h+=adminRow(t);});
  }
  TECH_ORDER.forEach(function(tid){
    var tech=USERS[tid];if(!tech)return;
    var mine=T.filter(function(t){return t.tech===tid&&t.status!=="done";});
    h+='<div style="margin-top:10px;">';
    h+='<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--g1);">'+avEl(tid,30,10);
    h+='<p style="font-size:13px;font-weight:700;flex:1;">'+tech.name+'</p>';
    h+='<span style="font-size:11px;font-weight:700;color:var(--acc);">'+mine.length+' actif'+(mine.length>1?"s":"")+'</span></div>';
    if(!mine.length){h+='<p style="font-size:12px;color:var(--g4);padding:8px 0;">Aucune intervention active</p>';}
    mine.forEach(function(t){h+=adminRow(t);});
    h+='</div>';
  });
  h+='</div>';
  // Company
  h+='<div class="a-card"><div class="a-title">Nom de l\'entreprise</div><input id="adm-co" class="a-inp" value="'+(CFG.company||"Loire Equipement")+'"><button onclick="saveCompany()" class="btn btn-p btn-full">Sauvegarder</button></div>';
  // Priorities
  h+='<div class="a-card"><div class="a-title">Etiquettes de priorite</div>';
  [{k:"low",c:"#9CA3AF"},{k:"medium",c:"#D97706"},{k:"urgent",c:"#B91C1C"}].forEach(function(p){
    h+='<div style="display:flex;align-items:center;gap:9px;margin-bottom:8px;"><div style="width:10px;height:10px;border-radius:50%;background:'+p.c+';flex-shrink:0;"></div><input id="prio_'+p.k+'" class="a-inp" style="margin:0;flex:1;" value="'+PC[p.k].l+'"/></div>';
  });
  h+='<button onclick="savePrios()" class="btn btn-p btn-full">Sauvegarder</button></div>';
  // Status labels
  h+='<div class="a-card"><div class="a-title">Etiquettes de statut</div>';
  [{k:"pending",dot:"#F59E0B"},{k:"assigned",dot:"#3B82F6"},{k:"in-progress",dot:"#8B5CF6"},{k:"done",dot:"#10B981"}].forEach(function(s){
    h+='<div style="display:flex;align-items:center;gap:9px;margin-bottom:8px;"><div style="width:10px;height:10px;border-radius:50%;background:'+s.dot+';flex-shrink:0;"></div><input id="stat_'+s.k.replace("-","_")+'" class="a-inp" style="margin:0;flex:1;" value="'+SC[s.k].l+'"/></div>';
  });
  h+='<button onclick="saveStats()" class="btn btn-p btn-full">Sauvegarder</button></div>';
  h+='<div style="text-align:center;padding:14px 0 4px;"><button onclick="doLogout()" style="background:none;border:none;font-size:12px;color:var(--g4);cursor:pointer;">Changer de profil</button></div>';
  document.getElementById("view-admin").innerHTML=h;
}
function adminRow(t){
  var r='<div onclick="openDetail(\''+t.id+'\')" style="display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--g1);cursor:pointer;">';
  r+='<div style="width:3px;height:28px;border-radius:2px;background:'+prioColor(t.priority)+';flex-shrink:0;"></div>';
  r+='<div style="flex:1;min-width:0;"><p style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+t.title+'</p>';
  r+='<p style="font-size:11px;color:var(--g6);">'+t.id+' · '+t.date+'</p></div>'+bH(t.status);
  if(t.tel)r+='<a href="tel:'+t.tel+'" onclick="event.stopPropagation()" style="width:30px;height:30px;border-radius:50%;background:var(--acc-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--acc)" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.65 3.38 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.5a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16z"/></svg></a>';
  r+='</div>';
  return r;
}
function saveCompany(){CFG.company=(document.getElementById("adm-co").value||"").trim()||"Loire Equipement";document.getElementById("tb-title").textContent=CFG.company;saveCfg();toast("Sauvegarde !");}
function savePrios(){["low","medium","urgent"].forEach(function(k){var el=document.getElementById("prio_"+k);if(el&&el.value.trim())PC[k].l=el.value.trim();});saveCfg();toast("Sauvegarde !");}
function saveStats(){[{k:"pending"},{k:"assigned"},{k:"in-progress"},{k:"done"}].forEach(function(s){var el=document.getElementById("stat_"+s.k.replace("-","_"));if(el&&el.value.trim())SC[s.k].l=el.value.trim();});saveCfg();toast("Sauvegarde !");}

function setColor(c){if(!PROFILES[CU.id])PROFILES[CU.id]={};PROFILES[CU.id].color=c;savePr();applyColor(CU.id);toast("Couleur appliquee !");openProfile();}
function removeBg(){if(!PROFILES[CU.id])PROFILES[CU.id]={};PROFILES[CU.id].bg=null;document.getElementById("main").style.backgroundImage="";savePr();openProfile();toast("Fond supprime.");}
function changePw(){
  var p1=(document.getElementById("prof-pw1")||{}).value||"";
  var p2=(document.getElementById("prof-pw2")||{}).value||"";
  if(p1.length<4){toast("Minimum 4 caracteres.");return;}
  if(p1!==p2){toast("Les mots de passe ne correspondent pas.");return;}
  if(!PROFILES[CU.id])PROFILES[CU.id]={};PROFILES[CU.id].pw=p1;savePr();toast("Mot de passe modifie !");
}
function registerBio(){
  if(!window.PublicKeyCredential){toast("Non supporte sur cet appareil.");return;}
  var ch=new Uint8Array(32);window.crypto.getRandomValues(ch);
  var uid=new Uint8Array(8);window.crypto.getRandomValues(uid);
  navigator.credentials.create({publicKey:{challenge:ch,rp:{name:"Loire Equipement",id:location.hostname||"localhost"},user:{id:uid,name:CU.id,displayName:CU.name},pubKeyCredParams:[{alg:-7,type:"public-key"},{alg:-257,type:"public-key"}],authenticatorSelection:{userVerification:"required",authenticatorAttachment:"platform"},timeout:60000}})
    .then(function(cred){try{localStorage.setItem("bio_"+CU.id,JSON.stringify({id:Array.from(new Uint8Array(cred.rawId))}));}catch(e){}toast("Empreinte enregistree !");})
    .catch(function(){toast("Enregistrement annule.");});
}
function updateNotifBtn(){
  var btn=document.getElementById("notif-btn");if(!btn)return;
  if(!("Notification" in window)){btn.textContent="Notifications non supportees";btn.disabled=true;return;}
  if(Notification.permission==="granted"){btn.textContent="Notifications activees";btn.style.background="var(--gnl)";btn.style.color="#065F46";btn.style.borderColor="var(--gn)";btn.disabled=true;}
  else if(Notification.permission==="denied"){btn.textContent="Bloquees (modifier dans Chrome)";btn.style.color="var(--rd)";btn.disabled=true;}
  else{btn.textContent="Activer les notifications push";btn.style.background="var(--acc)";btn.style.color="#fff";btn.style.borderColor="var(--acc)";}
}
function askNotif(){
  if(!("Notification" in window))return;
  Notification.requestPermission().then(function(p){
    if(p==="granted"){
      toast("Notifications activees !");
      // S'assurer que le SW est enregistre
      if("serviceWorker" in navigator){
        navigator.serviceWorker.register("firebase-messaging-sw.js")
          .then(function(reg){console.log("SW OK");})
          .catch(function(e){console.log("SW:",e);});
      }
    } else {
      toast("Notifications refusees. Activez-les dans les parametres Chrome.");
    }
    updateNotifBtn();
  });
}
document.getElementById("ph-av").onchange=function(ev){
  var f=ev.target.files[0];if(!f)return;
  var r=new FileReader();r.onload=function(e){if(!PROFILES[CU.id])PROFILES[CU.id]={};PROFILES[CU.id].photo=e.target.result;savePr();buildProfiles();
    var tbAv=document.getElementById("tb-av-wrap");tbAv.innerHTML='<img src="'+e.target.result+'" style="width:34px;height:34px;border-radius:50%;object-fit:cover;">';
    ev.target.value="";toast("Photo mise a jour !");openProfile();};r.readAsDataURL(f);
};
document.getElementById("ph-bg").onchange=function(ev){
  var f=ev.target.files[0];if(!f)return;
  var r=new FileReader();r.onload=function(e){if(!PROFILES[CU.id])PROFILES[CU.id]={};PROFILES[CU.id].bg=e.target.result;savePr();applyColor(CU.id);ev.target.value="";openProfile();toast("Fond applique !");};r.readAsDataURL(f);
};

function dtStatus(id,st){
  T=T.map(function(t){

    var e={h:now(),l:"Statut : "+SC[st].l,t:st==="done"?"done":"status"};
    var upd=Object.assign({},t,{status:st,hist:(t.hist||[]).concat([e])});
    if(st==="done")upd.doneAt=Date.now();
    if(st==="assigned"&&CU&&CU.role==="Technicien"&&!upd.tech){upd.tech=CU.id;upd.hist=upd.hist.concat([{h:now(),l:"Assigne a "+CU.name,t:"assign"}]);}
    return upd;
  });
  saveLocal();fbPush();
  if(st==="done"){
    closeDetail();toast("Ticket cloture !");

    }
  } else {
    var t=T.find(function(x){return x.id===id;});if(t)renderDetail(t,"info");
  }
  renderDash();
}
function dtTech(id,tid){

/* SIGNATURE */
var _sigCtx=null,_sigDrw=false;
function openSig(tid){
  sigTid=tid;
  closeOv("ov-detail");
  document.getElementById("ov-sig").classList.add("on");
  setTimeout(function(){
    var c=document.getElementById("sig-canvas");if(!c)return;
    var dpr=window.devicePixelRatio||1;
    c.width=c.offsetWidth*dpr; c.height=160*dpr;
    c.style.height="160px";
    _sigCtx=c.getContext("2d");
    _sigCtx.scale(dpr,dpr);
    _sigCtx.clearRect(0,0,c.width,c.height);
    _sigCtx.strokeStyle="#0F172A";_sigCtx.lineWidth=2.5;_sigCtx.lineCap="round";_sigCtx.lineJoin="round";
    _sigDrw=false;
    function getP(e){var r=c.getBoundingClientRect();var cx=e.clientX||(e.touches&&e.touches[0].clientX)||0;var cy=e.clientY||(e.touches&&e.touches[0].clientY)||0;return{x:cx-r.left,y:cy-r.top};}
    c.onpointerdown=function(e){_sigDrw=true;var p=getP(e);_sigCtx.beginPath();_sigCtx.moveTo(p.x,p.y);e.preventDefault();};
    c.onpointermove=function(e){if(!_sigDrw)return;var p=getP(e);_sigCtx.lineTo(p.x,p.y);_sigCtx.stroke();e.preventDefault();};
    c.onpointerup=function(){_sigDrw=false;};
    c.onpointerleave=function(){_sigDrw=false;};
  },200);
}
function sigClear(){if(_sigCtx){var c=document.getElementById("sig-canvas");_sigCtx.clearRect(0,0,c.width,c.height);}}
function sigSave(){
  var c=document.getElementById("sig-canvas");
  var data=c.toDataURL("image/png");
  T=T.map(function(t){return t.id===sigTid?Object.assign({},t,{signature:data,signedAt:now()}):t;});
  saveLocal();fbPush();closeOv("ov-sig");toast("Signature enregistree !");
  openDetail(sigTid);
}

function initFCM(){
  if(!("serviceWorker" in navigator)||!("PushManager" in window))return;
  if(!DB||!CU)return;
  navigator.serviceWorker.ready.then(function(reg){
    var vapidKey="BEYU_7ZgmgFksLyJuxnERR3RcVzq-BHNg_aZQJ5estkDLwf8P0Oh8SMG1WE-fqEjSkS0NsVtMhC4c-MCiAjst5A";
    // Convert VAPID key
    var padding=Array(4-vapidKey.replace(/-/g,"+").replace(/_/g,"/").length%4||4).join("=");
    var raw=window.atob(vapidKey.replace(/-/g,"+").replace(/_/g,"/")+padding);
    var arr=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
    reg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:arr
    }).then(function(sub){
      // Stocker l'endpoint dans Firebase
      var token=JSON.stringify(sub);
      DB.ref("savpro3/tokens/"+CU.id).set(sub.endpoint);
      console.log("Push subscription enregistree");
    }).catch(function(e){
      // Peut-etre deja abonne
      reg.pushManager.getSubscription().then(function(sub){
        if(sub&&DB&&CU){
          DB.ref("savpro3/tokens/"+CU.id).set(sub.endpoint);
          console.log("Push subscription existante enregistree");
        }
      });
    });
  }).catch(function(e){console.log("SW ready:",e);});
}

function sendPushToAll(title, body){
  if(!DB||!VERCEL_URL)return;
  // Lire tous les tokens depuis Firebase
  DB.ref("savpro3/tokens").once("value").then(function(snap){
    var data=snap.val();
    if(!data)return;
    var tokens=Object.values(data).filter(function(t){return typeof t==="string"&&t.length>10;});
    if(!tokens.length)return;
    fetch(VERCEL_URL+"/api/notify",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({title:title,body:body,tokens:tokens})
    }).then(function(r){return r.json();}).then(function(d){
      console.log("Notifications envoyees:",d.sent+"/"+d.total);
    }).catch(function(e){console.log("Push error:",e);});
  }).catch(function(e){});
}
